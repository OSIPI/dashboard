name: Metadata checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required repository files
        run: |
          test -f LICENSE
          test -f README.md
          test -f CITATION.cff
          test -f .zenodo.json
          test -f codemeta.json
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f GOVERNANCE.md
          test -f CODE_OF_CONDUCT.md
          test -f CHANGELOG.md

      - name: Validate JSON metadata
        run: |
          python -m json.tool .zenodo.json > /dev/null
          python -m json.tool codemeta.json > /dev/null

      - name: Check package metadata
        run: |
          python - <<'PY'
          import json
          import pathlib

          package = json.loads(pathlib.Path("package.json").read_text())
          assert package["name"] == "osipy-dashboard"
          assert package["license"] == "MIT"
          assert package["repository"]["url"] == "git+https://github.com/OSIPI/dashboard.git"
          assert package["bugs"]["url"] == "https://github.com/OSIPI/dashboard/issues"
          PY
