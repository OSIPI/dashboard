services:
  frontend:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - '${FRONTEND_PORT:-37183}:${FRONTEND_PORT:-37183}'
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - FRONTEND_PORT=${FRONTEND_PORT:-37183}
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0 --port $$FRONTEND_PORT"
    restart: unless-stopped
